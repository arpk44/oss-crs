name: Update UML Class Diagram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-uml:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get install -y graphviz
          pip install pylint

      - name: Generate UML class diagram
        run: |
          mkdir -p docs/uml
          pyreverse -o dot -p oss_patch $(find bug_fixing/src/oss_patch -name "*.py" | tr '\n' ' ') --output-directory docs/uml
          dot -Grankdir=TB -Tsvg docs/uml/classes_oss_patch.dot -o docs/uml/classes_oss_patch.svg
          rm -f docs/uml/*.dot

      - name: Commit and push diagram
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/uml/
          git diff --staged --quiet || git commit -m "Auto-update UML class diagram"
          git push
